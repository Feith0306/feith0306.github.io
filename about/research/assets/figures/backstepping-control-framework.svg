<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Adaptive backstepping control framework</title>
  <desc id="desc">A flow diagram showing constrained nonlinear plants, error transformation, recursive backstepping design, neural approximation, command filtering, robust control, and Lyapunov-certified outcomes.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#3b5b7e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2d3d" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg{fill:#f7fafc}.title{font:700 30px Arial,Helvetica,sans-serif;fill:#152536}.subtitle{font:400 16px Arial,Helvetica,sans-serif;fill:#526273}.box{fill:#fff;stroke:#8aa4bf;stroke-width:1.5;rx:18;filter:url(#shadow)}.box-blue{fill:#eef6ff;stroke:#6e9bc8}.box-green{fill:#edf8f2;stroke:#6ca984}.box-orange{fill:#fff6ea;stroke:#d69a4d}.box-purple{fill:#f4efff;stroke:#9279c7}.label{font:700 17px Arial,Helvetica,sans-serif;fill:#172635}.small{font:400 13.5px Arial,Helvetica,sans-serif;fill:#405160}.tiny{font:400 12px Arial,Helvetica,sans-serif;fill:#5b6876}.arrow{stroke:#3b5b7e;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dashed{stroke-dasharray:7 6}.pill{fill:#ffffff;stroke:#9eb3c8;stroke-width:1.2;rx:18}.outcome{fill:#12324d}.outtxt{font:700 14px Arial,Helvetica,sans-serif;fill:white}.math{font:italic 14px Georgia,serif;fill:#314355}
    </style>
  </defs>
  <rect width="1100" height="620" class="bg" rx="24"/>
  <text x="550" y="48" text-anchor="middle" class="title">Adaptive Backstepping Control: Logic and Technical Structure</text>
  <text x="550" y="76" text-anchor="middle" class="subtitle">constraints, uncertainty, recursive stabilization, neural approximation, and Lyapunov guarantees</text>

  <rect x="55" y="145" width="190" height="120" class="box box-blue"/>
  <text x="150" y="178" text-anchor="middle" class="label">Constrained</text>
  <text x="150" y="201" text-anchor="middle" class="label">Nonlinear Plant</text>
  <text x="150" y="229" text-anchor="middle" class="small">unknown dynamics</text>
  <text x="150" y="249" text-anchor="middle" class="small">dead-zone, delays, disturbances</text>

  <rect x="310" y="125" width="210" height="110" class="box box-green"/>
  <text x="415" y="158" text-anchor="middle" class="label">Constraint-Aware</text>
  <text x="415" y="181" text-anchor="middle" class="label">Error Transformation</text>
  <text x="415" y="209" text-anchor="middle" class="small">barrier / transformed variables</text>

  <rect x="310" y="285" width="210" height="110" class="box"/>
  <text x="415" y="318" text-anchor="middle" class="label">Recursive</text>
  <text x="415" y="341" text-anchor="middle" class="label">Backstepping Design</text>
  <text x="415" y="369" text-anchor="middle" class="small">virtual controls and stabilizers</text>

  <rect x="585" y="105" width="215" height="110" class="box box-orange"/>
  <text x="692.5" y="138" text-anchor="middle" class="label">Adaptive Neural</text>
  <text x="692.5" y="161" text-anchor="middle" class="label">Approximation</text>
  <text x="692.5" y="189" text-anchor="middle" class="small">unknown nonlinearities learned online</text>

  <rect x="585" y="265" width="215" height="110" class="box box-purple"/>
  <text x="692.5" y="298" text-anchor="middle" class="label">Command Filter</text>
  <text x="692.5" y="321" text-anchor="middle" class="label">and Compensation</text>
  <text x="692.5" y="349" text-anchor="middle" class="small">reduces repeated differentiation</text>

  <rect x="858" y="184" width="190" height="118" class="box box-blue"/>
  <text x="953" y="218" text-anchor="middle" class="label">Robust Adaptive</text>
  <text x="953" y="241" text-anchor="middle" class="label">Controller</text>
  <text x="953" y="269" text-anchor="middle" class="small">tracking, synchronization, H∞</text>

  <path class="arrow" d="M245 205 C270 205 282 181 307 181"/>
  <path class="arrow" d="M245 221 C275 238 278 340 307 340"/>
  <path class="arrow" d="M520 180 C548 174 556 164 582 160"/>
  <path class="arrow" d="M520 340 C548 335 556 326 582 320"/>
  <path class="arrow" d="M800 160 C830 164 836 205 855 220"/>
  <path class="arrow" d="M800 320 C830 315 836 275 855 260"/>

  <path class="arrow dashed" d="M953 302 C945 455 212 455 150 266"/>
  <text x="548" y="438" text-anchor="middle" class="math">closed-loop feedback: y, x, tracking error, synchronization error</text>

  <rect x="155" y="500" width="790" height="70" class="pill"/>
  <text x="550" y="525" text-anchor="middle" class="label">Lyapunov-Based Certification</text>
  <text x="550" y="550" text-anchor="middle" class="small">bounded closed-loop signals · constraint satisfaction · tracking / synchronization · disturbance attenuation</text>

  <path class="arrow" d="M415 395 C423 455 480 475 520 499"/>
  <path class="arrow" d="M692 375 C680 430 635 470 585 499"/>
  <path class="arrow" d="M953 302 C927 412 820 472 735 500"/>

  <rect x="88" y="320" width="120" height="36" class="outcome" rx="18"/>
  <text x="148" y="343" text-anchor="middle" class="outtxt">safe operation</text>
  <rect x="88" y="368" width="120" height="36" class="outcome" rx="18"/>
  <text x="148" y="391" text-anchor="middle" class="outtxt">uncertainty</text>
  <rect x="88" y="416" width="120" height="36" class="outcome" rx="18"/>
  <text x="148" y="439" text-anchor="middle" class="outtxt">robustness</text>
</svg>
