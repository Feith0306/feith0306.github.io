<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" role="img" aria-labelledby="title desc">
  <title id="title">Composite actor-critic reinforcement learning framework</title>
  <desc id="desc">A multi-player nonzero-sum differential game diagram showing actors, critics, historical data, instantaneous and recorded Bellman errors, composite critic learning, actor improvement, and approximate Nash equilibrium.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#344f6f"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2d3d" flood-opacity="0.16"/></filter>
    <style>
      .bg{fill:#f7fafc}.title{font:700 30px Arial,Helvetica,sans-serif;fill:#142537}.subtitle{font:400 16px Arial,Helvetica,sans-serif;fill:#536272}.box{fill:#fff;stroke:#8ea8c2;stroke-width:1.5;rx:18;filter:url(#shadow)}.blue{fill:#eef6ff;stroke:#6c99c5}.green{fill:#edf8f1;stroke:#67a77f}.orange{fill:#fff5e8;stroke:#d6994a}.purple{fill:#f3efff;stroke:#8d77bf}.gray{fill:#f3f6f8;stroke:#99a9b7}.label{font:700 17px Arial,Helvetica,sans-serif;fill:#172635}.small{font:400 13.5px Arial,Helvetica,sans-serif;fill:#405160}.tiny{font:400 12px Arial,Helvetica,sans-serif;fill:#5b6876}.arrow{stroke:#344f6f;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dashed{stroke-dasharray:7 6}.outcome{fill:#12324d;rx:18}.outtxt{font:700 14px Arial,Helvetica,sans-serif;fill:#fff}.note{font:italic 14px Georgia,serif;fill:#35475a}.formula{font:italic 15px Georgia,serif;fill:#24384d}
    </style>
  </defs>
  <rect width="1100" height="650" class="bg" rx="24"/>
  <text x="550" y="48" text-anchor="middle" class="title">Composite Actor–Critic Learning for Nonzero-Sum Differential Games</text>
  <text x="550" y="76" text-anchor="middle" class="subtitle">historical data reuse, relaxed excitation, coupled policy learning, and approximate Nash seeking</text>

  <rect x="70" y="175" width="210" height="120" class="box blue"/>
  <text x="175" y="208" text-anchor="middle" class="label">Multi-Player</text>
  <text x="175" y="231" text-anchor="middle" class="label">Differential Game</text>
  <text x="175" y="259" text-anchor="middle" class="small">shared dynamics</text>
  <text x="175" y="279" text-anchor="middle" class="small">coupled individual costs</text>

  <rect x="70" y="355" width="210" height="100" class="box gray"/>
  <text x="175" y="388" text-anchor="middle" class="label">Recorded Data Buffer</text>
  <text x="175" y="416" text-anchor="middle" class="small">state, policy, cost samples</text>
  <text x="175" y="436" text-anchor="middle" class="small">rank / excitation check</text>

  <rect x="350" y="130" width="250" height="135" class="box green"/>
  <text x="475" y="163" text-anchor="middle" class="label">Instantaneous Bellman Error</text>
  <text x="475" y="191" text-anchor="middle" class="formula">δᵢ(t): online trajectory information</text>
  <text x="475" y="221" text-anchor="middle" class="small">uses current state and current policies</text>
  <text x="475" y="242" text-anchor="middle" class="small">captures immediate game dynamics</text>

  <rect x="350" y="335" width="250" height="135" class="box orange"/>
  <text x="475" y="368" text-anchor="middle" class="label">Recorded Bellman Errors</text>
  <text x="475" y="396" text-anchor="middle" class="formula">δᵢʰ: historical data information</text>
  <text x="475" y="426" text-anchor="middle" class="small">reuse informative samples</text>
  <text x="475" y="447" text-anchor="middle" class="small">reduce dependence on PE</text>

  <rect x="670" y="185" width="235" height="125" class="box purple"/>
  <text x="787.5" y="218" text-anchor="middle" class="label">Composite Critic Learning</text>
  <text x="787.5" y="246" text-anchor="middle" class="formula">δᵢᶜ = δᵢ(t) + Σ δᵢʰ</text>
  <text x="787.5" y="276" text-anchor="middle" class="small">value-function weights updated</text>
  <text x="787.5" y="296" text-anchor="middle" class="small">under finite / sufficient excitation</text>

  <rect x="670" y="380" width="235" height="105" class="box blue"/>
  <text x="787.5" y="413" text-anchor="middle" class="label">Actor Policy Improvement</text>
  <text x="787.5" y="442" text-anchor="middle" class="small">decentralized policy networks</text>
  <text x="787.5" y="462" text-anchor="middle" class="small">for all players i = 1, …, N</text>

  <rect x="930" y="280" width="125" height="105" class="box green"/>
  <text x="992.5" y="313" text-anchor="middle" class="label">Approx.</text>
  <text x="992.5" y="336" text-anchor="middle" class="label">Nash Policy</text>
  <text x="992.5" y="364" text-anchor="middle" class="small">stable closed loop</text>

  <path class="arrow" d="M280 225 C310 216 320 204 347 198"/>
  <path class="arrow" d="M280 405 C310 405 320 405 347 405"/>
  <path class="arrow" d="M600 198 C632 202 643 226 667 241"/>
  <path class="arrow" d="M600 405 C634 388 643 298 667 265"/>
  <path class="arrow" d="M787 310 C787 337 787 350 787 377"/>
  <path class="arrow" d="M905 432 C946 420 968 393 984 386"/>
  <path class="arrow dashed" d="M992 280 C965 145 290 118 175 175"/>
  <path class="arrow dashed" d="M175 295 C175 318 175 330 175 352"/>

  <text x="540" y="545" text-anchor="middle" class="note">Composite learning turns stored trajectories into excitation resources instead of passive archives.</text>

  <rect x="155" y="575" width="165" height="42" class="outcome"/>
  <text x="237.5" y="601" text-anchor="middle" class="outtxt">relaxed PE demand</text>
  <rect x="340" y="575" width="175" height="42" class="outcome"/>
  <text x="427.5" y="601" text-anchor="middle" class="outtxt">data-efficient learning</text>
  <rect x="535" y="575" width="180" height="42" class="outcome"/>
  <text x="625" y="601" text-anchor="middle" class="outtxt">bounded weight errors</text>
  <rect x="735" y="575" width="190" height="42" class="outcome"/>
  <text x="830" y="601" text-anchor="middle" class="outtxt">approximate Nash seeking</text>
</svg>
