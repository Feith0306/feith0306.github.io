<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" role="img" aria-labelledby="title desc">
  <title id="title">Projected self-triggered reinforcement learning framework</title>
  <desc id="desc">A closed-loop diagram showing self-triggered sampling, projected actor-critic-disturbance or fuzzy reinforcement learning, experience replay, differential games, and performance outcomes.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#344f6f"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2d3d" flood-opacity="0.16"/></filter>
    <style>
      .bg{fill:#f8fbfd}.title{font:700 30px Arial,Helvetica,sans-serif;fill:#142537}.subtitle{font:400 16px Arial,Helvetica,sans-serif;fill:#536272}.box{fill:#fff;stroke:#90a9c2;stroke-width:1.5;rx:18;filter:url(#shadow)}.blue{fill:#eef6ff;stroke:#6c99c5}.green{fill:#edf8f1;stroke:#67a77f}.orange{fill:#fff5e8;stroke:#d6994a}.purple{fill:#f3efff;stroke:#8d77bf}.red{fill:#fff0f0;stroke:#c87b7b}.label{font:700 17px Arial,Helvetica,sans-serif;fill:#172635}.small{font:400 13.5px Arial,Helvetica,sans-serif;fill:#405160}.tiny{font:400 12px Arial,Helvetica,sans-serif;fill:#5b6876}.arrow{stroke:#344f6f;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dashed{stroke-dasharray:7 6}.outcome{fill:#12324d;rx:18}.outtxt{font:700 14px Arial,Helvetica,sans-serif;fill:#fff}.note{font:italic 14px Georgia,serif;fill:#35475a}
    </style>
  </defs>
  <rect width="1100" height="650" class="bg" rx="24"/>
  <text x="550" y="48" text-anchor="middle" class="title">Projected Self-Triggered Reinforcement Learning for Differential Games</text>
  <text x="550" y="76" text-anchor="middle" class="subtitle">intermittent execution, bounded adaptive weights, and game-theoretic policy learning</text>

  <rect x="70" y="160" width="190" height="110" class="box blue"/>
  <text x="165" y="193" text-anchor="middle" class="label">Sampled State</text>
  <text x="165" y="216" text-anchor="middle" class="label">x(t_k)</text>
  <text x="165" y="244" text-anchor="middle" class="small">information available only</text>
  <text x="165" y="263" text-anchor="middle" class="small">at triggering instants</text>

  <rect x="330" y="125" width="220" height="120" class="box green"/>
  <text x="440" y="158" text-anchor="middle" class="label">Self-Triggered</text>
  <text x="440" y="181" text-anchor="middle" class="label">Decision Rule</text>
  <text x="440" y="209" text-anchor="middle" class="small">predict triggering condition</text>
  <text x="440" y="229" text-anchor="middle" class="small">compute next update offline</text>

  <rect x="330" y="310" width="220" height="120" class="box orange"/>
  <text x="440" y="343" text-anchor="middle" class="label">Experience Replay</text>
  <text x="440" y="366" text-anchor="middle" class="label">and Bellman Error</text>
  <text x="440" y="394" text-anchor="middle" class="small">reuse finite historical data</text>
  <text x="440" y="414" text-anchor="middle" class="small">improve data efficiency</text>

  <rect x="620" y="115" width="250" height="145" class="box purple"/>
  <text x="745" y="148" text-anchor="middle" class="label">Projected Learning Laws</text>
  <text x="745" y="174" text-anchor="middle" class="small">Actor · Critic · Disturbance</text>
  <text x="745" y="196" text-anchor="middle" class="small">or fuzzy multi-player learners</text>
  <text x="745" y="222" text-anchor="middle" class="small">projection keeps adaptive</text>
  <text x="745" y="242" text-anchor="middle" class="small">weights inside compact sets</text>

  <rect x="620" y="335" width="250" height="115" class="box red"/>
  <text x="745" y="368" text-anchor="middle" class="label">Differential Game</text>
  <text x="745" y="391" text-anchor="middle" class="label">Closed Loop</text>
  <text x="745" y="419" text-anchor="middle" class="small">zero-sum H∞ or multi-player NZSG</text>

  <rect x="925" y="222" width="125" height="92" class="box blue"/>
  <text x="987.5" y="255" text-anchor="middle" class="label">Control</text>
  <text x="987.5" y="278" text-anchor="middle" class="label">Execution</text>
  <text x="987.5" y="301" text-anchor="middle" class="small">u(t_k) held</text>

  <path class="arrow" d="M260 206 C290 200 300 188 327 185"/>
  <path class="arrow" d="M550 185 C578 184 590 184 617 185"/>
  <path class="arrow" d="M870 185 C900 193 919 224 925 247"/>
  <path class="arrow" d="M987 314 C965 380 915 390 873 392"/>
  <path class="arrow" d="M620 392 C588 390 580 376 553 372"/>
  <path class="arrow" d="M440 310 C440 284 440 274 440 248"/>
  <path class="arrow dashed" d="M620 370 C579 316 575 238 620 205"/>
  <path class="arrow dashed" d="M745 450 C704 560 210 558 165 272"/>

  <text x="548" y="287" text-anchor="middle" class="note">intermittent learning and execution loop</text>
  <text x="494" y="495" text-anchor="middle" class="note">state returns only when the next self-triggered instant is reached</text>

  <rect x="105" y="555" width="230" height="42" class="outcome"/>
  <text x="220" y="581" text-anchor="middle" class="outtxt">no continuous monitoring</text>
  <rect x="355" y="555" width="145" height="42" class="outcome"/>
  <text x="427.5" y="581" text-anchor="middle" class="outtxt">Zeno-free</text>
  <rect x="520" y="555" width="145" height="42" class="outcome"/>
  <text x="592.5" y="581" text-anchor="middle" class="outtxt">UUB stability</text>
  <rect x="685" y="555" width="210" height="42" class="outcome"/>
  <text x="790" y="581" text-anchor="middle" class="outtxt">reduced sampling load</text>
</svg>
