<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#dce8e4">
  <meta name="description" content="Tianhao Fei / Feith — interactive academic profile">
  <title>Tianhao Fei / Feith</title>
  <link rel="icon" href="/img/fluid.ico">
  <link rel="stylesheet" href="/css/chat-home.css?v=20260723-2">
</head>
<body>
  <main class="stage">
    <section class="phone" aria-label="Interactive academic profile">
      <div class="ios-status-bar" aria-label="iPhone status bar">
        <time id="beijing-time" datetime="">12:00</time>
        <div class="dynamic-island" aria-hidden="true"></div>
        <div class="ios-status-icons" aria-label="Full cellular signal, full Wi-Fi, full battery">
          <svg class="cellular-icon" viewBox="0 0 19 12" aria-hidden="true">
            <rect x="0" y="8" width="3" height="4" rx="1"></rect>
            <rect x="5" y="6" width="3" height="6" rx="1"></rect>
            <rect x="10" y="3" width="3" height="9" rx="1"></rect>
            <rect x="15" y="0" width="3" height="12" rx="1"></rect>
          </svg>
          <svg class="wifi-icon" viewBox="0 0 18 13" aria-hidden="true">
            <path d="M1 4.1C5.7.1 12.3.1 17 4.1"></path>
            <path d="M4 7.2c3-2.5 7-2.5 10 0"></path>
            <path d="M7.1 10.2c1.2-1 2.6-1 3.8 0"></path>
            <circle cx="9" cy="11.4" r="1"></circle>
          </svg>
          <span class="battery-icon" aria-hidden="true"><span></span></span>
        </div>
      </div>

      <header class="chat-header">
        <div class="header-identity">
          <h1>Feith</h1>
          <p id="chat-status">学术主页</p>
        </div>
        <div class="language-switch" role="group" aria-label="Language">
          <button type="button" data-lang="zh" aria-pressed="true">中</button>
          <button type="button" data-lang="en" aria-pressed="false">EN</button>
        </div>
      </header>

      <section id="chat-window" class="chat-window" aria-live="polite" aria-label="Conversation">
        <div id="message-list" class="message-list"></div>
      </section>

      <footer class="chat-controls">
        <div id="about-menu" class="secondary-menu" hidden>
          <button type="button" data-story="profile">个人简介</button>
          <button type="button" data-story="education">教育经历</button>
          <button type="button" data-story="work">工作经历</button>
          <button type="button" data-story="research">科研经历</button>
          <button type="button" data-story="publications">学术成果</button>
        </div>
        <nav class="primary-menu" aria-label="Profile sections">
          <button id="about-button" type="button" aria-expanded="false">
            <span class="menu-icon" aria-hidden="true">●</span>
            <span data-label="about">关于我</span>
          </button>
          <a id="blog-button" href="/about/">
            <span class="menu-icon" aria-hidden="true">◆</span>
            <span data-label="blog">Blog</span>
          </a>
          <button type="button" data-story="contact">
            <span class="menu-icon" aria-hidden="true">✉</span>
            <span data-label="contact">联系我</span>
          </button>
        </nav>
      </footer>
    </section>
  </main>

  <noscript>
    <p class="noscript-message">
      This interactive profile requires JavaScript. Please visit
      <a href="/about/">the standard profile page</a>.
    </p>
  </noscript>
  <script src="/js/chat-home.js?v=20260723-2" defer></script>
</body>
</html>
